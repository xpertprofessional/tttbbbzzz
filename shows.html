<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shows</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        #data-source {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Shows</h1>
    </header>
    a hopefullly-one-day complete list of shows performed under various monikers in various projects<br><br>
    <div id="data-source"></div>
    <main>
        <table id="showsTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>City</th>
                    <th>Venue</th>
                    <th>Event</th>
                    <th>Act</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be inserted here -->
            </tbody>
        </table>
    </main>
    <script>
        async function fetchData() {
            const response = await fetch('shows.json');
            const data = await response.json();

            const tableBody = document.getElementById('showsTable').getElementsByTagName('tbody')[0];
            data.values.forEach(row => {
                const newRow = tableBody.insertRow();
                row.forEach(cell => {
                    const newCell = newRow.insertCell();
                    newCell.textContent = cell;
                });
            });

            const date = new Date(data.savedAt).toLocaleDateString();
            document.getElementById('data-source').textContent = `last updated ${date}`;
        }

        fetchData();
    </script>
</body>
</html>
