# .github/workflows/snapshot.yml
name: Snapshot Google Sheet

on:
  schedule:
    - cron: '0 3 * * *'  # runs every night at 3am UTC
  workflow_dispatch:       # allows manual trigger from GitHub Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch sheet and save as JSON
        env:
          API_KEY: ${{ secrets.SHEETS_API_KEY }}
        run: |
          curl -s "https://sheets.googleapis.com/v4/spreadsheets/1yl38lAtjqfn_v63gbCqfzOa4Ito7Iun6BtpMydgZEIc/values/Tabellenblatt1!B2:F?key=$API_KEY" \
            | python3 -c "
          import json, sys, datetime
          data = json.load(sys.stdin)
          output = {
            'values': data.get('values', []),
            'savedAt': datetime.datetime.utcnow().isoformat() + 'Z'
          }
          print(json.dumps(output, indent=2))
          " > shows.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add shows.json
          git diff --cached --quiet || git commit -m "snapshot: update shows.json"
          git push
